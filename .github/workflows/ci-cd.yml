name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION_FILE: devops-lab3.sln
  TEST_PROJECT: tests/mywebapp.Tests/mywebapp.Tests.csproj
  DOCKER_CONTEXT: ./lab1
  DOCKERFILE: lab1/src/mywebapp/Dockerfile
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  lint:
    name: Lint and Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore .NET projects
        run: dotnet restore "${{ env.SOLUTION_FILE }}"

      - name: Check .NET formatting
        run: dotnet format "${{ env.SOLUTION_FILE }}" --verify-no-changes --no-restore --verbosity minimal

      - name: Build with warnings as errors
        run: dotnet build "${{ env.SOLUTION_FILE }}" --configuration Release --no-restore -warnaserror

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ env.DOCKERFILE }}
          config: .hadolint.yaml

      - name: Lint deployment scripts with ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './scripts'

      - name: Lint Lab 1 scripts with ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './lab1/scripts'

      - name: Validate JSON configs
        run: |
          find lab1 deploy -type f -name '*.json' -not -path '*/bin/*' -not -path '*/obj/*' -print0 \
            | xargs -0 -r -n1 jq empty

      - name: Validate docker compose config
        run: docker compose -f lab1/docker-compose.yml config >/dev/null

  test:
    name: Tests and Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore .NET projects
        run: dotnet restore "${{ env.SOLUTION_FILE }}"

      - name: Run tests with coverage threshold
        run: |
          mkdir -p coverage TestResults
          dotnet test "${{ env.TEST_PROJECT }}" \
            --configuration Release \
            --no-restore \
            --logger trx \
            --results-directory TestResults \
            /p:CollectCoverage=true \
            /p:CoverletOutput="${{ github.workspace }}/coverage/" \
            /p:CoverletOutputFormat=cobertura \
            /p:Threshold=40 \
            /p:ThresholdType=line \
            /p:ThresholdStat=total

      - name: Upload coverage report from main
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/

  build:
    name: Build and Push Image
    needs: [lint, test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require annotated tag for release deploys
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag_type="$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}")"
          if [ "${tag_type}" != "tag" ]; then
            echo "Tag ${GITHUB_REF_NAME} is ${tag_type}; create an annotated tag with: git tag -a ${GITHUB_REF_NAME} -m 'Release ${GITHUB_REF_NAME}'" >&2
            exit 1
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=long,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.DOCKER_CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy and Verify
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: self-hosted
    environment: production
    env:
      TARGET_HOST: ${{ vars.TARGET_HOST }}
      TARGET_USER: ${{ vars.TARGET_USER }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to target node
        run: |
          target_host="${TARGET_HOST:-192.168.56.10}"
          target_user="${TARGET_USER:-mywebapp}"
          image_repository="${IMAGE_NAME}"
          image_tag="${GITHUB_REF_NAME}"

          echo "Deploying ${image_repository}:${image_tag} to ${target_user}@${target_host}"
          # shellcheck disable=SC2029
          ssh "${target_user}@${target_host}" "bash -s -- '${image_repository}' '${image_tag}'" < scripts/deploy.sh

      - name: Verify deployment
        run: |
          target_host="${TARGET_HOST:-192.168.56.10}"
          bash scripts/verify-deploy.sh "${target_host}"
