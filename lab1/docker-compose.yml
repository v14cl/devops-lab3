services:
  postgres:
    image: postgres:16-alpine
    container_name: mywebapp_postgres
    environment:
      POSTGRES_DB: mywebappdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mywebappdb"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mywebapp_network
    restart: unless-stopped

  mywebapp:
    build: 
      context: .
      dockerfile: src/mywebapp/Dockerfile
    container_name: mywebapp_web
    expose:
      - "8000"
    volumes:
      - ./config/config.json:/etc/mywebapp/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mywebapp_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: mywebapp_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mywebapp
    networks:
      - mywebapp_network
    restart: unless-stopped

networks:
  mywebapp_network:
    driver: bridge

volumes:
  postgres-data:
